version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: freelancex-db
    environment:
      POSTGRES_USER: freelancex
      POSTGRES_PASSWORD: freelancex_secret
      POSTGRES_DB: freelancex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelancex -d freelancex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freelancex-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: freelancex-meilisearch
    environment:
      MEILI_MASTER_KEY: freelancex_meili_master_key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
